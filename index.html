<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kilometer Tracker</title>
<style>
body {
    font-family: Arial;
    max-width: 400px;
    margin: 30px auto;
    padding: 20px;
    background-color: #121212;
    color: #e0e0e0;
}

input, button {
    width: 100%;
    padding: 15px;
    margin: 8px 0;
    font-size: 18px;
    background-color: #1e1e1e;
    color: #ffffff;
    border: 1px solid #333;
    border-radius: 10px;
}

button {
    cursor: pointer;
}

button:hover {
    background-color: #2a2a2a;
}

#summe {
    font-size: 28px;
    font-weight: bold;
    margin: 20px 0;
    color: #ffffff;
}

ul {
    color: #cfcfcf;
}
</style>
</head>
<body>

<h1>Kilometer Tracker</h1>

<input type="number" id="km" placeholder="Kilometer eingeben">
<button onclick="hinzufuegen()">Hinzufügen</button>

<div id="summe">0 km</div>

<ul id="liste"></ul>

<button onclick="resetten()">Reset nach Tanken</button>

<script>
let daten = JSON.parse(localStorage.getItem("kmDaten")) || [];

function speichern() {
    localStorage.setItem("kmDaten", JSON.stringify(daten));
    anzeigen();
}

function hinzufuegen() {
    const km = Number(document.getElementById("km").value);
    if (km > 0) {
        daten.push(km);
        document.getElementById("km").value = "";
        speichern();
    }
}

function anzeigen() {
    let summe = daten.reduce((a,b)=>a+b,0);
    document.getElementById("summe").innerText = summe + " km";

    let liste = document.getElementById("liste");
    liste.innerHTML = "";

    daten.forEach(km => {
        liste.innerHTML += `<li>${km} km</li>`;
    });
}

function resetten() {
    daten = [];
    speichern();
}

anzeigen();
</script>

</body>
</html>
